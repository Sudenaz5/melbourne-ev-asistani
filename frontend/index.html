<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melbourne Ev Karar Asistanı</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* BURAYA styles.css DOSYANDAKİ TÜM KODLARI YAPIŞTIR */
    /* Ekru'dan Koyu Kahveye Renk Paleti */
:root {
  --color-bg: #faf8f5;        /* Çok açık ekru (Arka plan) */
  --color-card: #fdfcfb;      /* Kart arka planı */
  --color-ecru: #f5eedc;      /* Vurgulu ekru */
  --color-tan: #d7ccc8;       /* Açık kahve/tan */
  --color-brown-light: #8d6e63; /* Orta açık kahve */
  --color-brown: #5d4037;     /* Orta koyu kahve */
  --color-brown-dark: #3e2723; /* Koyu kahve (Metinler) */
  --color-accent: #a1887f;    /* Vurgu kahvesi */
  --shadow-sm: 0 2px 4px rgba(62, 39, 35, 0.05);
  --shadow-md: 0 4px 12px rgba(62, 39, 35, 0.08);
  --shadow-lg: 0 8px 24px rgba(62, 39, 35, 0.12);
  --radius-md: 12px;
  --radius-lg: 20px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background-color: var(--color-bg);
  color: var(--color-brown-dark);
  line-height: 1.6;
}

h1, h2, h3, h4 {
  font-family: 'Playfair Display', serif;
  color: var(--color-brown-dark);
  font-weight: 600;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2rem;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--color-brown-dark) 0%, var(--color-brown) 100%);
  padding: 3rem;
  border-radius: var(--radius-lg);
  margin-bottom: 2rem;
  color: var(--color-ecru);
  box-shadow: var(--shadow-lg);
}

.header h1 {
  color: var(--color-bg);
  font-size: 2.5rem;
  margin-bottom: 0.5rem;
}

.header p {
  color: var(--color-tan);
  font-size: 1.1rem;
}

/* Cards & Panels */
.panel {
  background: var(--color-card);
  border-radius: var(--radius-lg);
  padding: 2rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 2rem;
  border: 1px solid var(--color-ecru);
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  font-size: 1.3rem;
}

.step-num {
  background: var(--color-brown-light);
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 0.9rem;
  font-family: 'Inter', sans-serif;
}

/* Form Elements */
.form-group {
  margin-bottom: 1.5rem;
}

label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--color-brown);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

select, input[type="range"], .form-input {
  width: 100%;
  padding: 0.75rem 1rem;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-tan);
  background-color: white;
  font-family: inherit;
  font-size: 1rem;
  color: var(--color-brown-dark);
  transition: all 0.2s ease;
}

select:focus, .form-input:focus {
  outline: none;
  border-color: var(--color-brown-light);
  box-shadow: 0 0 0 3px rgba(141, 110, 99, 0.2);
}

/* Button */
.btn-primary {
  background-color: var(--color-brown);
  color: white;
  border: none;
  padding: 1rem 2rem;
  font-size: 1.1rem;
  font-weight: 600;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
  margin-top: 1rem;
}

.btn-primary:hover {
  background-color: var(--color-brown-dark);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

/* Recommendation Cards */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  margin-top: 2rem;
}

.rec-card {
  background: white;
  border-radius: var(--radius-md);
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  border-top: 4px solid var(--color-brown-light);
  transition: transform 0.3s ease;
}

.rec-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
}

.rec-price {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--color-brown-dark);
  margin: 1rem 0;
}

.rec-details {
  display: flex;
  justify-content: space-between;
  margin-bottom: 1rem;
  color: var(--color-brown);
  font-size: 0.95rem;
}

.badge-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.badge {
  background: var(--color-ecru);
  color: var(--color-brown-dark);
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 500;
  display: inline-block;
}

.loader {
  border: 4px solid var(--color-ecru);
  border-top: 4px solid var(--color-brown);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 2rem auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}

@media (max-width: 768px) {
  .grid-2, .grid-4 {
    grid-template-columns: 1fr;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 2rem;
  background: white;
  padding: 0.5rem;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-tan);
  overflow-x: auto;
}

.tab-btn {
  padding: 0.75rem 1.5rem;
  background: transparent;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  color: var(--color-brown-light);
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.tab-btn:hover {
  background: var(--color-bg);
}

.tab-btn.active {
  background: var(--color-brown-dark);
  color: white;
}

/* Charts & Maps */
.chart-container {
  background: white;
  border-radius: var(--radius-md);
  padding: 1rem;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--color-ecru);
  margin-bottom: 1.5rem;
}

.map-container {
  height: 500px;
  width: 100%;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  border: 2px solid var(--color-tan);
  z-index: 1;
}

/* Comparison Table */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

.compare-table th {
  background: var(--color-brown-dark);
  color: white;
  padding: 1rem;
  text-align: left;
}

.compare-table td {
  padding: 1rem;
  border-bottom: 1px solid var(--color-ecru);
  color: var(--color-brown-dark);
}

.compare-table tr:last-child td {
  border-bottom: none;
}

.compare-table tr:nth-child(even) {
  background: var(--color-bg);
}

.win-green {
  color: #2e7d32;
  font-weight: 700;
}
.lose-red {
  color: #c62828;
  font-weight: 700;
}
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background-color: #f4f4f4; 
        }
        #root { min-height: 100vh; }
        /* Örnek stil - kendi stillerini buraya ekle */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // BURAYA app.jsx DOSYANDAKİ TÜM KODLARI YAPIŞTIR
const { useState, useEffect } = React;

function App() {
    const [oda, setOda] = useState(3);
    const [alan, setAlan] = useState(120);
    const [mesafe, setMesafe] = useState(10);
    const [yas, setYas] = useState(5);
    const [fiyat, setFiyat] = useState(null);
    const [loading, setLoading] = useState(false);

    const hesapla = async () => {
        setLoading(true);
        const veri = {
            oda_sayisi: oda,
            metrekare: alan,
            bolge_id: mesafe,
            bina_yasi: yas,
            banyo_sayisi: 1,
            garaj_sayisi: 1,
            ev_tipi: 0,
            bolge_kodu: 2
        };

        try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(veri)
            });
            const data = await response.json();
            setFiyat(data.tahmini_fiyat);
        } catch (error) {
            console.error(error);
            setFiyat("Hata");
        }
        setLoading(false);
    };

    return (
        <div className="container">
            <header className="header">
                <h1>Melbourne Ev Karar Asistanı</h1>
                <p>Makine öğrenmesi destekli, premium ev fiyat tahmin asistanı.</p>
            </header>

            <main className="grid-2">
                <section className="panel">
                    <div className="panel-title">
                        <div className="step-num">1</div>
                        <h3>Ev Özellikleri</h3>
                    </div>
                    
                    <div className="form-group">
                        <label>Oda Sayısı: <span style={{color: 'var(--color-brown-light)'}}>{oda}</span></label>
                        <input type="range" min="1" max="10" value={oda} onChange={e => setOda(Number(e.target.value))} />
                    </div>

                    <div className="form-group">
                        <label>Metrekare (m²):</label>
                        <input type="number" className="form-input" value={alan} onChange={e => setAlan(Number(e.target.value))} />
                    </div>

                    <div className="form-group">
                        <label>Merkeze Uzaklık (km):</label>
                        <input type="number" className="form-input" value={mesafe} onChange={e => setMesafe(Number(e.target.value))} />
                    </div>

                    <div className="form-group">
                        <label>Bina Yaşı (Yıl):</label>
                        <input type="number" className="form-input" value={yas} onChange={e => setYas(Number(e.target.value))} />
                    </div>

                    <button className="btn-primary" onClick={hesapla} disabled={loading}>
                        {loading ? "Hesaplanıyor..." : "Fiyatı Tahmin Et"}
                    </button>
                </section>

                <section className="panel">
                    <div className="panel-title">
                        <div className="step-num">2</div>
                        <h3>Tahmin Sonucu</h3>
                    </div>
                    
                    {loading && <div className="loader"></div>}
                    
                    {!loading && fiyat !== null && (
                        <div className="result-container" style={{ textAlign: 'center', padding: '2rem 0' }}>
                            <p style={{ fontSize: '1.2rem', color: 'var(--color-brown-light)', marginBottom: '1rem', fontWeight: '500' }}>Modelimizin tahmini:</p>
                            {typeof fiyat === 'number' && fiyat > 0 ? (
                                <h2 style={{ fontSize: '3.5rem', color: 'var(--color-brown-dark)', fontFamily: 'Playfair Display' }}>
                                    {fiyat.toLocaleString('tr-TR', { maximumFractionDigits: 0 })} <span style={{fontSize: '2rem'}}>$</span>
                                </h2>
                            ) : (
                                <p style={{ color: 'red', fontWeight: 'bold' }}>Model yüklenemedi veya bir hata oluştu.</p>
                            )}
                        </div>
                    )}
                    
                    {!loading && fiyat === null && (
                        <div style={{ textAlign: 'center', padding: '3rem 0', color: 'var(--color-tan)', fontSize: '1.1rem' }}>
                            <p>Tahmin için yandaki özellikleri doldurup<br/>butona tıklayın.</p>
                        </div>
                    )}
                </section>
            </main>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
        
        const { useState, useEffect } = React;

        const App = () => {
            return (
                <div style={{ padding: '20px', textAlign: 'center' }}>
                    <h1>Melbourne Ev Karar Asistanı</h1>
                    <p>Arayüz başarıyla yüklendi!</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
